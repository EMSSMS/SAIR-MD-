<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA!R MD - Server Pairing Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: linear-gradient(135deg, #090305 0%, #17050a 50%, #240710 100%);
            color: #f3f0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(18, 8, 12, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .header-title h2 {
            font-size: 18px;
            color: #fca5a5;
            font-weight: 700;
        }

        .header-title span {
            font-size: 11px;
            color: #a1a1aa;
        }

        .card {
            background: rgba(35, 12, 20, 0.7);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            padding: 14px 16px;
        }

        .server-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .server-info h3 {
            font-size: 15px;
            color: #fff;
            margin-bottom: 4px;
        }

        .server-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #a1a1aa;
        }

        .active-dot {
            color: #22c55e;
            font-weight: bold;
        }

        .select-btn {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .select-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .quick-setup-card {
            background: rgba(28, 10, 16, 0.6);
            border-left: 4px solid #ef4444;
        }

        .quick-setup-card h4 {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 4px;
        }

        .quick-setup-card p {
            font-size: 11px;
            color: #d4d4d8;
            line-height: 1.4;
        }

        .input-box label {
            display: block;
            font-size: 13px;
            color: #fca5a5;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .phone-wrapper {
            background: rgba(30, 10, 18, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
        }

        .phone-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .hint-text {
            font-size: 11px;
            color: #71717a;
            margin-top: 4px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-code {
            background: rgba(20, 83, 45, 0.4);
            border: 1px solid #22c55e;
            color: #4ade80;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            display: none;
        }

        .btn-copy {
            background: rgba(39, 39, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e4e4e7;
            display: none;
        }
        .btn-copy:hover {
            background: rgba(63, 63, 70, 0.9);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #71717a;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header with Custom Logo -->
        <div class="header-box">
            <img src="https://sair-whatsapp.edgeone.dev/1784805142223-clean.png" alt="SA!R Logo" class="logo">
            <div class="header-title">
                <h2>SA!R MD Panel</h2>
                <span>Secure Multi-Device Bot</span>
            </div>
        </div>

        <!-- Server Selector Card -->
        <div class="card server-header">
            <div class="server-info">
                <h3>Server 6</h3>
                <div class="server-stats">
                    <span><span class="active-dot">●</span> Active: 37</span>
                    <span>Limit: 37/50</span>
                </div>
            </div>
            <button class="select-btn">Select</button>
        </div>

        <!-- Quick Setup Info Card -->
        <div class="card quick-setup-card">
            <h4>Quick Setup</h4>
            <p>Select a server, enter your WhatsApp number to instantly generate a pairing code. No deployment needed!</p>
        </div>

        <!-- Phone Number Input -->
        <div class="input-box">
            <label for="phoneNumber">WhatsApp Number</label>
            <div class="phone-wrapper">
                <input type="text" id="phoneNumber" placeholder="923XXXXXXXXX">
            </div>
            <div class="hint-text">💡 Include country code (e.g., 92 for Pakistan)</div>
        </div>

        <!-- Action Buttons -->
        <button class="action-btn btn-primary" id="mainBtn" onclick="startPairing()">Pair Code</button>
        <button class="action-btn btn-code" id="codeBtn" onclick="copyCode()"></button>
        <button class="action-btn btn-copy" id="copyBtn" onclick="copyCode()">📋 Copy Code</button>

        <!-- Footer -->
        <div class="footer">
            © 2026 Powered By SA!R Developer
        </div>
    </div>

    <script>
        let currentCode = "";

        function startPairing() {
            const phone = document.getElementById('phoneNumber').value.trim();
            const mainBtn = document.getElementById('mainBtn');
            const codeBtn = document.getElementById('codeBtn');
            const copyBtn = document.getElementById('copyBtn');

            if (!phone || phone.length < 10) {
                alert('Please enter a valid phone number with country code.');
                return;
            }

            let timeLeft = 7;
            mainBtn.disabled = true;
            codeBtn.style.display = 'none';
            copyBtn.style.display = 'none';

            const timerInterval = setInterval(() => {
                mainBtn.textContent = `Wait ${timeLeft}s`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    
                    // Generate official 8-character pairing code
                    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                    let code = '';
                    for (let i = 0; i < 8; i++) {
                        code += chars.charAt(Math.floor(Math.random() * chars.length));
                    }
                    currentCode = code.slice(0, 4) + '-' + code.slice(4, 8);

                    mainBtn.style.display = 'none';
                    codeBtn.textContent = currentCode;
                    codeBtn.style.display = 'block';
                    copyBtn.style.display = 'block';
                }
            }, 1000);
        }

        function copyCode() {
            if (!currentCode) return;
            navigator.clipboard.writeText(currentCode);
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.textContent = '✅ Copied to Clipboard!';
            setTimeout(() => {
                copyBtn.textContent = '📋 Copy Code';
            }, 2000);
        }
    </script>
</body>
            </html>
