<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA!R MD - Pairing Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: linear-gradient(135deg, #090514 0%, #130b2b 50%, #1a103c 100%); color: #f3f0ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 420px; background: rgba(19, 13, 38, 0.85); backdrop-filter: blur(16px); border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6); overflow: hidden; border: 1px solid rgba(147, 51, 234, 0.25); margin: 16px; }
        .page { display: none; padding: 32px 24px; flex-direction: column; align-items: center; text-align: center; }
        .page.active { display: flex; }
        .logo { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 2px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.4); margin-bottom: 20px; }
        h2 { color: #d8b4fe; font-size: 22px; margin-bottom: 16px; font-weight: 600; }
        .notes-box { width: 100%; background: rgba(30, 20, 60, 0.6); border-radius: 12px; padding: 18px; margin-bottom: 24px; text-align: left; border-left: 4px solid #a855f7; border: 1px solid rgba(147, 51, 234, 0.15); }
        .notes-box h3 { font-size: 12px; color: #c084fc; margin-bottom: 10px; text-transform: uppercase; font-weight: 700; }
        .notes-list { list-style: none; }
        .notes-list li { font-size: 13px; color: #e9d5ff; padding: 6px 0; border-bottom: 1px solid rgba(147, 51, 234, 0.1); }
        .btn { background: linear-gradient(135deg, #9333ea, #7e22ce); color: #fff; border: none; padding: 14px 24px; font-size: 15px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4); transition: 0.2s; }
        .btn:hover { background: linear-gradient(135deg, #a855f7, #9333ea); }
        .input-group { width: 100%; margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; color: #c084fc; margin-bottom: 8px; font-weight: 500; }
        .phone-input-wrapper { display: flex; background: rgba(30, 20, 60, 0.6); border-radius: 10px; border: 1px solid rgba(147, 51, 234, 0.3); overflow: hidden; }
        .phone-input-wrapper input { width: 100%; background: transparent; border: none; padding: 14px; color: #f3f0ff; font-size: 15px; outline: none; }
        .pair-result-box { width: 100%; background: rgba(30, 20, 60, 0.8); border-radius: 10px; padding: 16px; margin-top: 16px; display: none; border: 1px dashed #a855f7; }
        .pair-code-text { font-family: monospace; font-size: 20px; color: #e9d5ff; letter-spacing: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div id="page1" class="page active">
            <img src="https://sair-whatsapp.edgeone.dev/1784805142223-clean.png" alt="SA!R Logo" class="logo">
            <h2>SA!R MD System</h2>
            <div class="notes-box">
                <h3>Bot Features Included</h3>
                <ul class="notes-list">
                    <li>1: View Once Image Unlock (.ii)</li>
                    <li>2: Group Control (.close / .open)</li>
                    <li>3: Auto Reply & Sticker Support</li>
                    <li>4: Welcome Message & Admin Controls</li>
                </ul>
            </div>
            <button class="btn" onclick="goToPage2()">Connect Bot</button>
        </div>

        <div id="page2" class="page">
            <img src="https://sair-whatsapp.edgeone.dev/1784805142223-clean.png" alt="SA!R Logo" class="logo">
            <h2>Pair Device</h2>
            <div class="input-group">
                <label for="phoneNumber">WhatsApp Number:</label>
                <div class="phone-input-wrapper">
                    <input type="text" id="phoneNumber" placeholder="923XXXXXXXXX">
                </div>
            </div>
            <button class="btn" onclick="generatePairCode()" id="pairBtn" style="margin-bottom: 8px;">Pair Code</button>
            <div id="pairResult" class="pair-result-box">
                <span style="font-size:11px; color:#c084fc; font-weight:700; display:block; margin-bottom:4px;">YOUR PAIR CODE</span>
                <div id="codeDisplay" class="pair-code-text">SAIR-8821-X</div>
            </div>
        </div>
    </div>
    <script>
        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
        }
        function generatePairCode() {
            const phone = document.getElementById('phoneNumber').value.trim();
            if (!phone || phone.length < 10) {
                alert('Please enter a valid phone number with country code.');
                return;
            }
            const btn = document.getElementById('pairBtn');
            btn.textContent = 'Generating...';
            btn.disabled = true;
            setTimeout(() => {
                const code = 'SAIR-' + Math.floor(1000 + Math.random() * 9000) + '-' + Math.random().toString(36).substring(2, 5).toUpperCase();
                document.getElementById('codeDisplay').textContent = code;
                document.getElementById('pairResult').style.display = 'block';
                btn.textContent = 'Pair Code';
                btn.disabled = false;
            }, 1000);
        }
    </script>
</body>
</html>
